<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDDB — Login</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm mx-4">

    <!-- Logo -->
    <div class="flex flex-col items-center mb-8 gap-3">
      <img src="/static/favicon-192.png" class="w-20 h-20 rounded-2xl" alt="SDDB">
      <div class="text-center">
        <h1 class="text-xl font-semibold text-white">SDDB</h1>
        <p class="text-sm text-slate-500">Container Dashboard</p>
      </div>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-2xl">
      <h2 class="text-base font-semibold text-white mb-5">Sign in</h2>

      {{if .Error}}
      <div class="mb-4 px-3 py-2.5 rounded-lg bg-red-500/10 border border-red-500/30 text-sm text-red-400">
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label for="username" class="block text-xs text-slate-400 mb-1.5">Username</label>
          <input id="username" name="username" type="text" required autofocus
            class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm text-white
                   placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50
                   transition-colors">
        </div>
        <div>
          <label for="password" class="block text-xs text-slate-400 mb-1.5">Password</label>
          <input id="password" name="password" type="password" required
            class="w-full bg-slate-800 border border-slate-700 rounded-md px-3 py-2 text-sm text-white
                   placeholder-slate-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50
                   transition-colors">
        </div>
        <button type="submit"
          class="w-full py-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white text-sm font-medium
                 rounded-md transition-colors mt-2">
          Sign in
        </button>
      </form>
    </div>

  </div>
</body>
</html>
