services:
  dashboard:
    build: .
    restart: unless-stopped
    ports:
      - "8069:8080"
    volumes:
      - sddb-data:/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-}

volumes:
  sddb-data:
